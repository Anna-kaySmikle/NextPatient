<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QueueCare - Hospital Queue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; margin: 0; }
    header { background: #007bff; color: white; padding: 1rem; }
    main { padding: 2rem; max-width: 500px; margin: auto; }
    .current-number { font-size: 5rem; margin: 2rem 0; }
    .controls button { font-size: 1.5rem; padding: 0.5rem 1rem; margin: 0.5rem; cursor: pointer; }
    .patient-input { margin-top: 2rem; text-align: left; }
    label { display: block; margin-top: 1rem; font-weight: bold; }
    input { padding: 0.5rem; font-size: 1rem; width: 100%; margin-top: 0.3rem; }
    button { margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>QueueCare</h1>
    <p>Track your turn at the hospital</p>
  </header>
  <main>
    <div class="current-number" id="currentNumber">0</div>
    <div class="controls">
      <button id="upBtn">⬆ Next Patient</button>
    </div>

    <div class="patient-input">
      <h2>Notify Me</h2>
      
      <label for="myNumber">Your Number:</label>
      <input type="number" id="myNumber" placeholder="Enter your number">

      <label for="notifyBefore">Start notifications this many patients before your turn:</label>
      <input type="number" id="notifyBefore" placeholder="e.g., 3" value="1">

      <button id="notifyBtn">Set Notifications</button>
    </div>
  </main>

  <!-- Beep sound -->
  <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
  <audio id="finalSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

  <script>
    let currentNumber = 0;

    const currentNumberEl = document.getElementById('currentNumber');
    const upBtn = document.getElementById('upBtn');
    const myNumberInput = document.getElementById('myNumber');
    const notifyBeforeInput = document.getElementById('notifyBefore');
    const notifyBtn = document.getElementById('notifyBtn');
    const alertSound = document.getElementById('alertSound');
    const finalSound = document.getElementById('finalSound');

    // Track patient notifications
    let notifyNumber = null;
    let notifyBefore = 1;

    function showNotification(title, message) {
      if (Notification.permission === "granted") {
        new Notification(title, { body: message });
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission().then(permission => {
          if (permission === "granted") {
            new Notification(title, { body: message });
          }
        });
      }
    }

    function updateDisplay() {
      currentNumberEl.textContent = currentNumber;

      if (notifyNumber !== null) {
        // Start notifications leading up to the number
        if (currentNumber >= notifyNumber - notifyBefore && currentNumber < notifyNumber) {
          alertSound.play();
          showNotification("QueueCare", `Your turn is coming soon! Current number: ${currentNumber}`);
        }

        // When your number is called
        if (currentNumber === notifyNumber) {
          finalSound.play();
          showNotification("QueueCare", `It's your turn! Number: ${currentNumber}`);
          alert(`It's your turn! Number: ${currentNumber}`);
        }
      }
    }

    // Increment number (doctor/staff)
    upBtn.addEventListener('click', () => {
      currentNumber++;
      updateDisplay();
    });

    // Set patient notifications
    notifyBtn.addEventListener('click', () => {
      const enteredNumber = parseInt(myNumberInput.value);
      const beforeNumber = parseInt(notifyBeforeInput.value) || 1;

      if (isNaN(enteredNumber) || enteredNumber <= 0) {
        alert("Please enter a valid patient number.");
        return;
      }

      notifyNumber = enteredNumber;
      notifyBefore = beforeNumber;

      alert(`Notifications set for numbers ${notifyNumber - notifyBefore} to ${notifyNumber}`);
    });

    // Initial display
    updateDisplay();
  </script>
</body>
</html>
